<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ثبت در سایت</title>

</head>
<body class="reg">
    <main>
        <h2>سایت برنامه نویسی شرکت کن</h2>
            <form id="registerForm" class="sabtnam" action="register.php" method="POST">

            <label>نام و نام خانوادگی:</label><br>
            <input type="text" id="fullname" name="fullname" required><br><br>
        
            <label>شماره تلفن:</label><br>
            <input type="tel" id="phone" name="phone" required><br><br>
        
            <label>کد ملی:</label><br>
            <input type="text" id="codemeli" name="codemeli" required><br><br>
        
            <label>رمز عبور:</label><br>
            <input type="password" id="password" name="password" required><br><br>
        
            <button class="button" type="submit" name="submit">ثبت‌نام در سایت</button>
        </form>
    </main>

</body>
</html>
